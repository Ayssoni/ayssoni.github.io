<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Account | Soni Jewellers</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/auth.css">
</head>
<body class="auth-page">
    <main class="auth-container">
        <div class="auth-header">
            <p class="auth-eyebrow">Customer Account</p>
            <h1>My Account</h1>
            <p class="auth-subtitle">Your customer profile is connected with Firebase.</p>
        </div>

        <section class="auth-card">
            <h2 id="account-name">Loading...</h2>
            <p id="account-email" class="auth-meta"></p>
            <div class="form-buttons">
                <a href="shop.html" class="btn btn-primary auth-btn">Continue Shopping</a>
                <button id="logout-btn" class="btn btn-outline auth-btn" type="button">Logout</button>
            </div>
        </section>
    </main>

    <script type="module" src="js/account.js"></script>
</body>
</html>
