<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customer Login | Soni Jewellers</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/auth.css">
</head>
<body class="auth-page" data-login-role="customer">
    <main class="auth-container">
        <div class="auth-header">
            <p class="auth-eyebrow">Customer Access</p>
            <h1>Customer Login</h1>
            <p class="auth-subtitle">Sign in to shop faster, save your details, and continue checkout smoothly.</p>
        </div>

        <div class="auth-grid">
            <section class="auth-card">
                <h2>Email Login</h2>
                <form id="email-auth-form" class="auth-form">
                    <label for="full-name">Full Name</label>
                    <input type="text" id="full-name" class="auth-input" placeholder="Required for signup" autocomplete="name">

                    <label for="email">Email</label>
                    <input type="email" id="email" class="auth-input" placeholder="Enter your email" autocomplete="email" required>

                    <label for="password">Password</label>
                    <input type="password" id="password" class="auth-input" placeholder="Enter password" autocomplete="current-password" required>

                    <div class="form-buttons">
                        <button id="login-email-btn" class="btn btn-outline auth-btn" type="button">Log In</button>
                        <button id="signup-email-btn" class="btn btn-primary auth-btn" type="button">Sign Up</button>
                    </div>
                    <p id="auth-message" class="auth-message" role="status"></p>
                </form>
            </section>

            <section class="auth-card">
                <h2>Google Sign-In</h2>
                <p class="auth-meta">Use your Google account as a customer account.</p>
                <button id="google-login-btn" class="btn btn-primary auth-btn" type="button">Sign in with Google</button>
            </section>
        </div>

        <div class="auth-footer-actions">
            <a href="admin-login.html">Admin login</a>
            <a href="index.html">Back to website</a>
        </div>
    </main>

    <script type="module" src="js/login.js"></script>
</body>
</html>
